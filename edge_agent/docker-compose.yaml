version: '3.8'

# =============================================================================
# Customer Edge Stack — Lightweight relay + MCP tool servers
#
# Sits on the SAME network as the customer's infrastructure (SRE Demo App)
# so MCP servers can query Prometheus, Loki, etc. directly.
#
# Communicates with the SaaS platform via host.docker.internal:8080.
#
# Usage:
#   1. Start SRE Demo App first  (cd SRE_Demo_App && docker compose up -d)
#   2. Create .env with CLUSTER_TOKEN  (from SaaS dashboard)
#   3. docker compose up -d --build
# =============================================================================

services:
  # ============================================
  # Edge Relay (polls SaaS, executes tool calls)
  # ============================================

  edge-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: edge-relay
    environment:
      # Connection to SaaS Platform
      - CLUSTER_TOKEN=${CLUSTER_TOKEN}
      - SAAS_URL=${SAAS_URL:-http://host.docker.internal:8080}
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-3}

      # MCP Server URIs (all local to this Docker network)
      - MCP_K8S_URI=http://mcp-k8s:3000/sse
      - MCP_LOGS_URI=http://mcp-loki:3000/sse
      - MCP_METRICS_URI=http://mcp-prometheus:3000/sse
      - MCP_GITHUB_URI=http://mcp-github:3000/sse
      - MCP_RUNBOOKS_URI=http://mcp-notion:3000/sse
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edge-network
    depends_on:
      - mcp-k8s
      - mcp-prometheus
    restart: unless-stopped

  # ============================================
  # MCP Tool Servers (read from YOUR infra)
  # ============================================

  mcp-k8s:
    build:
      context: ./mcp_servers/k8s_real
      dockerfile: Dockerfile
    container_name: mcp-k8s
    volumes:
      - ${HOME}/.kube:/root/.kube:ro
    environment:
      - HOST=0.0.0.0
      - KUBERNETES_API_SERVER_HOST=host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - edge-network
    restart: unless-stopped

  mcp-prometheus:
    build:
      context: ./mcp_servers/prometheus_real
      dockerfile: Dockerfile
    container_name: mcp-prometheus
    environment:
      # Reaches Prometheus on the Demo App's network
      - PROMETHEUS_URL=${PROMETHEUS_URL:-http://prometheus:9090}
      - HOST=0.0.0.0
    networks:
      - edge-network
      - demo-net        # Join Demo App network to reach Prometheus
    restart: unless-stopped

  mcp-loki:
    build:
      context: ./mcp_servers/loki_real
      dockerfile: Dockerfile
    container_name: mcp-loki
    environment:
      # Reaches Loki on the Demo App's network
      - LOKI_URL=${LOKI_URL:-http://loki:3100}
      - HOST=0.0.0.0
    networks:
      - edge-network
      - demo-net        # Join Demo App network to reach Loki
    restart: unless-stopped

  mcp-github:
    build:
      context: ./mcp_servers/github_real
      dockerfile: Dockerfile
    container_name: mcp-github
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GITHUB_REPO=${GITHUB_REPO}
      - HOST=0.0.0.0
    networks:
      - edge-network
    restart: unless-stopped

  mcp-notion:
    build:
      context: ./mcp_servers/notion_real
      dockerfile: Dockerfile
    container_name: mcp-notion
    environment:
      - NOTION_API_KEY=${NOTION_API_KEY}
      - NOTION_DATABASE_ID=${NOTION_RUNBOOK_DATABASE_ID}
      - HOST=0.0.0.0
    networks:
      - edge-network
    restart: unless-stopped

networks:
  edge-network:
    driver: bridge
    name: sre-edge-network
  demo-net:
    external: true
    name: sre-demo-net    # Created by SRE Demo App's docker-compose
